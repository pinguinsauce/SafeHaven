<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safehaven</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.5);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #222;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #333;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 glass border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-2">
                    <div class="bg-blue-600 p-1.5 rounded-lg">
                        <i data-lucide="shield" class="w-5 h-5 text-black"></i>
                    </div>
                    <span class="font-bold text-xl tracking-tighter uppercase">Safe<span class="text-blue-500">haven</span></span>
                </div>
                
                <div class="flex items-center gap-6">
                    <button onclick="switchTab('home')" class="nav-btn flex items-center gap-2 text-blue-500" id="btn-home">
                        <i data-lucide="home" class="w-4 h-4"></i>
                        <span class="hidden sm:inline">Home</span>
                    </button>
                    <button onclick="switchTab('manga')" class="nav-btn flex items-center gap-2 text-white/60 hover:text-white transition-colors" id="btn-manga">
                        <i data-lucide="book-open" class="w-4 h-4"></i>
                        <span class="hidden sm:inline">Manga</span>
                    </button>
                    <button onclick="switchTab('music')" class="nav-btn flex items-center gap-2 text-white/60 hover:text-white transition-colors" id="btn-music">
                        <i data-lucide="music" class="w-4 h-4"></i>
                        <span class="hidden sm:inline">Music</span>
                    </button>
                    <button onclick="switchTab('proxy')" class="nav-btn flex items-center gap-2 text-white/60 hover:text-white transition-colors" id="btn-proxy">
                        <i data-lucide="globe" class="w-4 h-4"></i>
                        <span class="hidden sm:inline">Proxy</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-24 pb-12 min-h-screen">
        
        <!-- Home Tab -->
        <div id="tab-home" class="tab-content active max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <header class="mb-12">
                <h1 class="text-4xl sm:text-6xl font-black tracking-tighter uppercase mb-4">
                    The <span class="text-blue-500">Vault</span>
                </h1>
                <p class="text-white/40 max-w-xl">Your personal collection of unblocked games and tools. Safe, secure, and always accessible.</p>
            </header>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="game-grid">
                <!-- Games will be injected here -->
            </div>
        </div>

        <!-- Manga Tab -->
        <div id="tab-manga" class="tab-content max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="w-full h-[85vh] bg-[#111] rounded-3xl overflow-hidden border border-white/10 shadow-2xl flex flex-col">
                <div class="flex items-center justify-between px-6 py-4 border-b border-white/5 bg-[#151515]">
                    <div class="flex items-center gap-3">
                        <div class="bg-orange-500/10 p-2 rounded-lg">
                            <i data-lucide="book-open" class="w-5 h-5 text-orange-500"></i>
                        </div>
                        <h2 class="font-bold text-lg tracking-tight uppercase">Manga<span class="text-orange-500">Taro</span></h2>
                    </div>
                    <a href="https://mangataro.com" target="_blank" class="flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-black text-xs font-bold uppercase tracking-widest rounded-xl transition-colors">
                        <i data-lucide="external-link" class="w-4 h-4"></i>
                        Open in New Tab
                    </a>
                </div>
                <iframe src="https://mangataro.com" class="flex-1 w-full border-none"></iframe>
            </div>
        </div>

        <!-- Music Tab -->
        <div id="tab-music" class="tab-content max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="w-full h-[85vh] bg-[#111] rounded-3xl overflow-hidden border border-white/10 shadow-2xl flex flex-col">
                <div class="flex items-center justify-between px-6 py-4 border-b border-white/5 bg-[#151515]">
                    <div class="flex items-center gap-3">
                        <div class="bg-blue-500/10 p-2 rounded-lg">
                            <i data-lucide="music" class="w-5 h-5 text-blue-500"></i>
                        </div>
                        <h2 class="font-bold text-lg tracking-tight uppercase">Safe<span class="text-blue-500">Music</span></h2>
                    </div>
                    <div class="flex items-center gap-2 px-3 py-1 bg-blue-500/10 text-blue-500 rounded text-[10px] font-bold uppercase tracking-widest border border-blue-500/20">
                        <i data-lucide="play" class="w-3 h-3 fill-current"></i>
                        <span>Live Player</span>
                    </div>
                </div>
                <iframe src="https://www.youtube.com/embed/videoseries?list=PLMC9KNkIncKtPojQ-nERwDLU7MBVzwMVK&autoplay=0" class="flex-1 w-full border-none" allow="autoplay; encrypted-media"></iframe>
            </div>
        </div>

        <!-- Proxy Tab -->
        <div id="tab-proxy" class="tab-content max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="w-full h-[85vh] bg-[#111] rounded-3xl overflow-hidden border border-white/10 shadow-2xl flex flex-col">
                <div class="flex flex-col sm:flex-row items-center gap-4 px-6 py-4 border-b border-white/5 bg-[#151515]">
                    <div class="flex items-center gap-3 shrink-0">
                        <div class="bg-blue-600/10 p-2 rounded-lg">
                            <i data-lucide="globe" class="w-5 h-5 text-blue-500"></i>
                        </div>
                        <h2 class="font-bold text-lg tracking-tight uppercase">Safe<span class="text-blue-500">Search</span></h2>
                    </div>
                    <div class="flex-1 w-full flex items-center gap-2">
                        <div class="relative flex-1 group">
                            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-white/40 group-focus-within:text-blue-500 transition-colors"></i>
                            <input type="text" id="proxy-input" placeholder="Enter URL or search query..." class="w-full bg-white/5 border border-white/10 rounded-xl py-2 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all placeholder:text-white/20 text-sm text-white">
                        </div>
                        <button onclick="handleProxySearch()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-black text-xs font-bold uppercase tracking-widest rounded-xl transition-colors shrink-0">Go</button>
                    </div>
                    <div class="flex items-center gap-2 shrink-0">
                        <button onclick="openProxyNewTab()" class="p-2 hover:bg-white/5 rounded-lg transition-colors text-white/60 hover:text-white" title="Open in new tab">
                            <i data-lucide="external-link" class="w-5 h-5"></i>
                        </button>
                        <div class="flex items-center gap-1.5 px-2 py-1 bg-emerald-500/10 text-emerald-500 rounded text-[10px] font-bold uppercase tracking-widest border border-emerald-500/20">
                            <i data-lucide="shield-check" class="w-3 h-3"></i>
                            <span>Encrypted</span>
                        </div>
                    </div>
                </div>
                <div class="flex-1 bg-black relative">
                    <iframe id="proxy-iframe" src="https://www.google.com/search?igu=1" class="w-full h-full border-none" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
            </div>
        </div>

    </main>

    <!-- Game Modal -->
    <div id="game-modal" class="fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-xl"></div>
        <div class="relative h-full flex flex-col">
            <div class="flex items-center justify-between px-6 py-4 border-b border-white/10">
                <div class="flex items-center gap-4">
                    <button onclick="closeGame()" class="p-2 hover:bg-white/10 rounded-full transition-colors">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                    <h2 id="modal-title" class="text-xl font-bold tracking-tight uppercase"></h2>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="toggleFullscreen()" class="p-2 hover:bg-white/10 rounded-full transition-colors">
                        <i data-lucide="maximize-2" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
            <div class="flex-1 bg-black">
                <iframe id="game-iframe" class="w-full h-full border-none" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        // Game Data
        const games = [
            { id: "2048", title: "2048", thumbnail: "https://picsum.photos/seed/2048/400/300", url: "https://play2048.co/" },
            { id: "flappy-bird", title: "Flappy Bird", thumbnail: "https://picsum.photos/seed/flappy/400/300", url: "https://flappybird.io/" },
            { id: "tetris", title: "Tetris", thumbnail: "https://picsum.photos/seed/tetris/400/300", url: "https://tetris.com/play-tetris" },
            { id: "snake", title: "Snake", thumbnail: "https://picsum.photos/seed/snake/400/300", url: "https://www.google.com/logos/2010/pacman10-i.html" },
            { id: "dino-run", title: "Dino Run", thumbnail: "https://picsum.photos/seed/dino/400/300", url: "https://chromedino.com/" },
            { id: "sudoku", title: "Sudoku", thumbnail: "https://picsum.photos/seed/sudoku/400/300", url: "https://www.websudoku.com/" },
            { id: "hammer-play", title: "Hammer Play", thumbnail: "https://picsum.photos/seed/hammer/400/300", url: "https://hammerplay.cdn.msnfun.com/9ng6vdg4354c/v28/index.html?msstart_sdk_init=eyJwYXJlbnRPcmlnaW4iOiJodHRwczovL3d3dy5tc24uY29tIiwiY2xpZW50SWQiOiIwQUI2OTEyNDVDMzA2RkI0MTJGRDg2MDQ1REI5NkVGRCIsImxvY2FsZSI6ImVuLXVzIiwiZW50cnlQb2ludElkIjoiIiwic3dpdGNoR2FtZVBheWxvYWQiOnsic3dpdGNoZWRUbyI6IjluZzZ2ZGc0MzU0YyIsInZhbHVlIjp7fX19" }
        ];

        // Initialize Lucide Icons
        lucide.createIcons();

        // Tab Switching Logic
        function switchTab(tabId) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            // Show selected tab
            document.getElementById('tab-' + tabId).classList.add('active');
            
            // Update nav buttons
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-blue-500');
                btn.classList.add('text-white/60');
            });
            document.getElementById('btn-' + tabId).classList.add('text-blue-500');
            document.getElementById('btn-' + tabId).classList.remove('text-white/60');
        }

        // Render Games
        const gameGrid = document.getElementById('game-grid');
        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card glass rounded-2xl overflow-hidden cursor-pointer transition-all duration-300 group';
            card.onclick = () => openGame(game);
            card.innerHTML = `
                <div class="relative aspect-video overflow-hidden">
                    <img src="${game.thumbnail}" alt="${game.title}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                        <div class="bg-blue-600 p-3 rounded-full transform translate-y-4 group-hover:translate-y-0 transition-transform">
                            <i data-lucide="play" class="w-6 h-6 text-black fill-current"></i>
                        </div>
                    </div>
                </div>
                <div class="p-4 flex items-center justify-between">
                    <h3 class="font-bold text-sm tracking-tight uppercase">${game.title}</h3>
                    <div class="p-1.5 bg-white/5 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity">
                        <i data-lucide="maximize-2" class="w-3 h-3 text-white/40"></i>
                    </div>
                </div>
            `;
            gameGrid.appendChild(card);
        });
        lucide.createIcons(); // Re-init for injected icons

        // Game Modal Logic
        function openGame(game) {
            const modal = document.getElementById('game-modal');
            const iframe = document.getElementById('game-iframe');
            const title = document.getElementById('modal-title');
            
            title.innerText = game.title;
            iframe.src = game.url;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeGame() {
            const modal = document.getElementById('game-modal');
            const iframe = document.getElementById('game-iframe');
            
            iframe.src = '';
            modal.classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function toggleFullscreen() {
            const iframe = document.getElementById('game-iframe');
            if (iframe.requestFullscreen) {
                iframe.requestFullscreen();
            } else if (iframe.webkitRequestFullscreen) {
                iframe.webkitRequestFullscreen();
            } else if (iframe.msRequestFullscreen) {
                iframe.msRequestFullscreen();
            }
        }

        // Proxy Logic
        function handleProxySearch() {
            const input = document.getElementById('proxy-input');
            const iframe = document.getElementById('proxy-iframe');
            let url = input.value;
            
            if (!url) return;
            
            if (!url.startsWith('http')) {
                url = `https://www.google.com/search?q=${encodeURIComponent(url)}&igu=1`;
            }
            iframe.src = url;
        }

        function openProxyNewTab() {
            const iframe = document.getElementById('proxy-iframe');
            window.open(iframe.src, '_blank');
        }

        // Enter key for proxy
        document.getElementById('proxy-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleProxySearch();
        });
    </script>
</body>
</html>
